---
- name: Booking Studio Musik
  hosts: localhost
  connection: local
  become: yes
  tasks:

    - name: Setup Database
      block:
        - name: Install MySQL Server
          apt:
            name: mysql-server
            state: present
            update_cache: yes

        - name: Konfigurasi Akses Remote MySQL
          lineinfile:
            path: /etc/mysql/mysql.conf.d/mysqld.cnf
            regexp: '^bind-address'
            line: 'bind-address = 0.0.0.0'

        - name: Setup Database dan Tabel Booking
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS db_studio;"
            mysql -e "CREATE USER IF NOT EXISTS 'studio_user'@'%' IDENTIFIED BY 'studio123';"
            mysql -e "GRANT ALL PRIVILEGES ON db_studio.* TO 'studio_user'@'%';"
            mysql -e "USE db_studio; CREATE TABLE IF NOT EXISTS booking (
              id INT AUTO_INCREMENT PRIMARY KEY,
              nama_studio VARCHAR(100),
              tanggal DATE,
              jam_mulai TIME,
              jam_selesai TIME,
              nama_pemesan VARCHAR(100),
              no_hp VARCHAR(20),
              metode_bayar ENUM('tunai','transfer','qris') DEFAULT 'tunai',
              harga DECIMAL(15,2),
              status ENUM('pending','konfirmasi','batal') DEFAULT 'pending'
            );"
            mysql -e "FLUSH PRIVILEGES;"

        - name: Restart MySQL
          service:
            name: mysql
            state: restarted
      when: target_node == 'database'

    - name: Setup Backend API
      block:
        - name: Install Python Libs
          apt:
            name:
              - python3-pip
              - python3-flask
              - python3-flask-cors
              - python3-mysqldb
            state: present

        - name: Deploy app.py
          copy:
            dest: "/home/vagrant/app.py"
            content: |
              from flask import Flask, request, jsonify
              from flask_cors import CORS
              import MySQLdb
              import MySQLdb.cursors

              app = Flask(__name__)
              CORS(app)

              def get_db():
                return MySQLdb.connect(
                  host="192.168.56.11",
                  user="studio_user",
                  passwd="studio123",
                  db="db_studio",
                  cursorclass=MySQLdb.cursors.DictCursor
                )

              @app.route('/api/booking', methods=['GET'])
              def get_all():
                db = get_db(); cur = db.cursor()
                cur.execute("""SELECT id, nama_studio,
                  DATE_FORMAT(tanggal, '%d/%m/%Y') as tanggal,
                  TIME_FORMAT(jam_mulai, '%H:%i') as jam_mulai,
                  TIME_FORMAT(jam_selesai, '%H:%i') as jam_selesai,
                  nama_pemesan, no_hp, metode_bayar,
                  CAST(harga AS CHAR) as harga, status
                  FROM booking ORDER BY id DESC""")
                res = cur.fetchall(); db.close()
                return jsonify(res)

              @app.route('/api/booking', methods=['POST'])
              def add():
                d = request.json
                db = get_db(); cur = db.cursor()
                cur.execute("""INSERT INTO booking
                  (nama_studio, tanggal, jam_mulai, jam_selesai, nama_pemesan, no_hp, metode_bayar, harga)
                  VALUES (%s,%s,%s,%s,%s,%s,%s,%s)""",
                  (d['nama_studio'], d['tanggal'], d['jam_mulai'], d['jam_selesai'],
                   d['nama_pemesan'], d['no_hp'], d['metode_bayar'], d['harga']))
                db.commit(); db.close()
                return jsonify({"status": "sukses"})

              @app.route('/api/booking/<int:id>', methods=['DELETE'])
              def delete(id):
                db = get_db(); cur = db.cursor()
                cur.execute("DELETE FROM booking WHERE id=%s", (id,))
                db.commit(); db.close()
                return jsonify({"status": "terhapus"})

              if __name__ == '__main__':
                app.run(host='0.0.0.0', port=5000)

        - name: Start Backend
          shell: "nohup sudo python3 /home/vagrant/app.py > /tmp/app.log 2>&1 &"
      when: target_node == 'backend'

    - name: Setup Frontend
      block:
        - name: Install Nginx
          apt:
            name: nginx
            state: present

        - name: Deploy index.html
          copy:
            dest: "/var/www/html/index.html"
            content: |
              <!DOCTYPE html>
              <html lang="id">
              <head>
                <meta charset="UTF-8">
                <title>Booking Studio Musik</title>
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                <style>
                  body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; padding: 20px; color: #fff; }
                  .header-banner { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
                  .card { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 12px; margin-bottom: 20px; }
                  .card-body { padding: 25px; }
                  .form-label { color: #a0aec0; }
                  .form-control, .form-select { background: #16213e; border: 1px solid #0f3460; color: #fff; }
                  .form-control:focus, .form-select:focus { background: #16213e; color: #fff; border-color: #e94560; box-shadow: none; }
                  .form-control::placeholder { color: #4a5568; }
                  .btn-book { background: linear-gradient(135deg, #e94560, #0f3460); color: white; border: none; font-weight: 600; padding: 12px; }
                  .btn-book:hover { opacity: 0.9; color: white; }
                  .studio-card { background: #16213e; border: 2px solid #0f3460; border-radius: 10px; padding: 20px; height: 100%; }
                  .studio-card h6 { color: #e94560; font-size: 1.1rem; margin-bottom: 10px; }
                  .studio-card p { color: #a0aec0; font-size: 12px; margin: 4px 0; }
                  .studio-card .harga { color: #48bb78; font-weight: bold; font-size: 16px; margin-top: 10px; }
                  .studio-card .badge-studio { background: #0f3460; color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 20px; }
                  table { color: #fff; }
                  th { background: #0f3460 !important; color: #fff !important; }
                  td { border-color: #1a1a2e !important; vertical-align: middle; }
                  tr:hover td { background: #16213e !important; }
                  .badge-pending { background: #d69e2e; }
                  .badge-konfirmasi { background: #276749; }
                  .badge-batal { background: #c53030; }
                  .total-card { background: linear-gradient(135deg, #0f3460, #1a1a2e); border: 1px solid #e94560; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
                  .total-card h3 { color: #48bb78; font-size: 2rem; }
                  select option { background: #16213e; }
                  .divider { border-color: #0f3460; margin: 5px 0 15px 0; }
                </style>
              </head>
              <body>
              <div class="container" style="max-width:1000px;">

                <div class="header-banner">
                  <div style="font-size:3rem;">🎸</div>
                  <h2 class="mb-1">Booking Studio Musik</h2>
                  <p class="mb-0 opacity-75">Reservasi studio rekaman dan latihan profesional</p>
                </div>

                <div class="total-card">
                  <p class="mb-1 text-secondary">Total Pendapatan Studio</p>
                  <h3 id="totalPendapatan">Rp 0</h3>
                  <small class="text-secondary" id="totalBookingCount">0 Booking</small>
                </div>

                <!-- Pricelist Studio -->
                <div class="card">
                  <div class="card-body">
                    <h5 class="mb-1" style="color:#e94560;">🎵 Daftar Studio & Harga</h5>
                    <p style="color:#a0aec0; font-size:13px;" class="mb-3">Pilih studio sesuai kebutuhan kamu di form booking</p>
                    <div class="row g-3">
                      <div class="col-md-3">
                        <div class="studio-card">
                          <span class="badge-studio">Studio A</span>
                          <h6 class="mt-2">🎙️ Recording Pro</h6>
                          <hr class="divider">
                          <p>👥 Kapasitas 4 orang</p>
                          <p>🔇 Ruangan Soundproof</p>
                          <p>🎚️ Mic Condenser</p>
                          <p>🖥️ Audio Interface</p>
                          <p>🎧 Headphone Monitor</p>
                          <div class="harga">Rp 150.000/jam</div>
                        </div>
                      </div>
                      <div class="col-md-3">
                        <div class="studio-card">
                          <span class="badge-studio">Studio B</span>
                          <h6 class="mt-2">🎸 Latihan Band</h6>
                          <hr class="divider">
                          <p>👥 Kapasitas 6 orang</p>
                          <p>🥁 Drum Kit Lengkap</p>
                          <p>🎸 Gitar + Bass</p>
                          <p>🎹 Keyboard</p>
                          <p>🔊 Ampli & Speaker</p>
                          <div class="harga">Rp 100.000/jam</div>
                        </div>
                      </div>
                      <div class="col-md-3">
                        <div class="studio-card">
                          <span class="badge-studio">Studio C</span>
                          <h6 class="mt-2">🥁 Drum Room</h6>
                          <hr class="divider">
                          <p>👥 Kapasitas 2 orang</p>
                          <p>🥁 Drum Kit Pro</p>
                          <p>🎵 Metronome Digital</p>
                          <p>🔇 Peredam Suara</p>
                          <p>💡 Pencahayaan Studio</p>
                          <div class="harga">Rp 75.000/jam</div>
                        </div>
                      </div>
                      <div class="col-md-3">
                        <div class="studio-card">
                          <span class="badge-studio">Studio D</span>
                          <h6 class="mt-2">🏆 Premium Package</h6>
                          <hr class="divider">
                          <p>👥 Kapasitas 8 orang</p>
                          <p>⭐ Semua Fasilitas</p>
                          <p>👨‍💻 Sound Engineer</p>
                          <p>🎬 Video Recording</p>
                          <p>☕ Ruang Tunggu VIP</p>
                          <div class="harga">Rp 200.000/jam</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Form Booking -->
                <div class="card">
                  <div class="card-body">
                    <h5 class="mb-3" style="color:#e94560;">📝 Form Booking</h5>
                    <form id="formBooking">
                      <input type="hidden" id="harga">
                      <div class="row g-3">
                        <div class="col-md-6">
                          <label class="form-label">Pilih Studio</label>
                          <select id="nama_studio" class="form-select" onchange="updateHarga()">
                            <option value="Studio A" data-harga="150000">🎙️ Studio A - Recording Pro (Rp 150.000/jam)</option>
                            <option value="Studio B" data-harga="100000">🎸 Studio B - Latihan Band (Rp 100.000/jam)</option>
                            <option value="Studio C" data-harga="75000">🥁 Studio C - Drum Room (Rp 75.000/jam)</option>
                            <option value="Studio D" data-harga="200000">🏆 Studio D - Premium (Rp 200.000/jam)</option>
                          </select>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Tanggal Booking</label>
                          <input type="date" id="tanggal" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Nama Pemesan</label>
                          <input type="text" id="nama_pemesan" class="form-control" placeholder="Nama lengkap" required>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Nomor HP</label>
                          <input type="text" id="no_hp" class="form-control" placeholder="08xxxxxxxxxx" required>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Jam Mulai</label>
                          <input type="time" id="jam_mulai" class="form-control" required oninput="hitungHarga()">
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Jam Selesai</label>
                          <input type="time" id="jam_selesai" class="form-control" required oninput="hitungHarga()">
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Metode Pembayaran</label>
                          <select id="metode_bayar" class="form-select">
                            <option value="tunai">💵 Tunai</option>
                            <option value="transfer">🏦 Transfer Bank</option>
                            <option value="qris">📱 QRIS</option>
                          </select>
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Total Harga</label>
                          <input type="text" id="total_display" class="form-control" readonly style="color:#48bb78;font-weight:bold;">
                        </div>
                        <div class="col-12">
                          <button type="submit" class="btn btn-book w-100">🎵 Booking Sekarang</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>

                <!-- Tabel Booking -->
                <div class="card">
                  <div class="card-body">
                    <h5 class="mb-3" style="color:#e94560;">📋 Daftar Booking</h5>
                    <div class="table-responsive">
                      <table class="table table-hover align-middle">
                        <thead>
                          <tr>
                            <th>Studio</th><th>Pemesan</th><th>No HP</th>
                            <th>Tanggal</th><th>Jam Mulai</th><th>Jam Selesai</th>
                            <th>Pembayaran</th><th>Total</th><th>Status</th><th>Aksi</th>
                          </tr>
                        </thead>
                        <tbody id="tabelBooking"></tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
              <script>
                const API = 'http://192.168.56.10:5000/api/booking';
                let hargaPerJam = 150000;

                function updateHarga() {
                  const sel = document.getElementById('nama_studio');
                  hargaPerJam = parseInt(sel.options[sel.selectedIndex].dataset.harga);
                  hitungHarga();
                }

                function hitungHarga() {
                  const mulai = document.getElementById('jam_mulai').value;
                  const selesai = document.getElementById('jam_selesai').value;
                  if (!mulai || !selesai) return;
                  const [jm, mm] = mulai.split(':').map(Number);
                  const [js, ms] = selesai.split(':').map(Number);
                  const durasi = ((js * 60 + ms) - (jm * 60 + mm)) / 60;
                  if (durasi <= 0) {
                    document.getElementById('total_display').value = 'Jam selesai harus lebih dari jam mulai';
                    document.getElementById('harga').value = '';
                    return;
                  }
                  const total = durasi * hargaPerJam;
                  document.getElementById('total_display').value = 'Rp ' + total.toLocaleString('id-ID') + ' (' + durasi + ' jam)';
                  document.getElementById('harga').value = total;
                }

                async function loadData() {
                  try {
                    const res = await fetch(API);
                    const data = await res.json();
                    const tbody = document.getElementById('tabelBooking');
                    tbody.innerHTML = '';
                    let totalPendapatan = 0;
                    data.forEach(item => {
                      totalPendapatan += parseFloat(item.harga);
                      const badgeClass = item.status === 'konfirmasi' ? 'badge-konfirmasi' : item.status === 'batal' ? 'badge-batal' : 'badge-pending';
                      const metodeIcon = item.metode_bayar === 'tunai' ? '💵' : item.metode_bayar === 'transfer' ? '🏦' : '📱';
                      tbody.innerHTML += '<tr><td><strong>' + item.nama_studio + '</strong></td><td>' + item.nama_pemesan + '</td><td>' + item.no_hp + '</td><td>' + item.tanggal + '</td><td>' + item.jam_mulai + '</td><td>' + item.jam_selesai + '</td><td>' + metodeIcon + ' ' + item.metode_bayar.toUpperCase() + '</td><td style="color:#48bb78;font-weight:bold;">Rp ' + parseFloat(item.harga).toLocaleString('id-ID') + '</td><td><span class="badge ' + badgeClass + '">' + item.status.toUpperCase() + '</span></td><td><button class="btn btn-danger btn-sm" onclick="hapus(' + item.id + ')">Hapus</button></td></tr>';
                    });
                    document.getElementById('totalPendapatan').innerText = 'Rp ' + totalPendapatan.toLocaleString('id-ID');
                    document.getElementById('totalBookingCount').innerText = data.length + ' Booking';
                  } catch(e) { console.error(e); }
                }

                async function hapus(id) {
                  if (!confirm('Yakin hapus booking ini?')) return;
                  await fetch(API + '/' + id, { method: 'DELETE' });
                  loadData();
                }

                document.getElementById('formBooking').addEventListener('submit', async function(e) {
                  e.preventDefault();
                  const harga = document.getElementById('harga').value;
                  if (!harga) { alert('Isi jam mulai dan jam selesai terlebih dahulu!'); return; }
                  const data = {
                    nama_studio: document.getElementById('nama_studio').value,
                    tanggal: document.getElementById('tanggal').value,
                    jam_mulai: document.getElementById('jam_mulai').value,
                    jam_selesai: document.getElementById('jam_selesai').value,
                    nama_pemesan: document.getElementById('nama_pemesan').value,
                    no_hp: document.getElementById('no_hp').value,
                    metode_bayar: document.getElementById('metode_bayar').value,
                    harga: harga
                  };
                  await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
                  alert('Booking berhasil!');
                  this.reset();
                  loadData();
                });

                loadData();
              </script>
              </body>
              </html>
      when: target_node == 'frontend' 